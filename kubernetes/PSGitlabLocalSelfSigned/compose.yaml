#    extra_hosts:
#      - "gitlab.example.com:host-gateway"

  runner:
    image: gitlab/gitlab-runner
    profiles:
      - manual
    environment:
      - DOCKER_HOST=tcp://dind:2376
      - DOCKER_TLS_VERIFY=1
      - DOCKER_TLS_CERTDIR=/certs
      - DOCKER_CERT_PATH=/certs/client
    volumes:
      - ./.secrets/dind_SERVICE/certs:/certs
      - runner-config:/etc/gitlab-runner:z
      - ./.secrets/create-certificate_SERVICE/ssl:/etc/gitlab-runner/certs:ro,z
    networks:
      gitlab-internal:
    extra_hosts:
      - "gitlab.example.com:host-gateway"


  register-runner-docker:
    image: gitlab/gitlab-runner
    depends_on:
      - dind
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        if [ ! -f /etc/gitlab-runner/config.toml ]; then
          echo "Config does not exist, registering runner..."
          gitlab-runner register \
            --non-interactive \
            --locked=false \
            --name="GitLab Docker Runner" \
            --executor=docker \
            --docker-image=ubuntu:latest \
            --docker-host=tcp://dind:2376 \
            --docker-volumes "/etc/gitlab-runner/certs:/etc/gitlab-runner/certs/extra" \
            --docker-extra-hosts="gitlab.example.com:host-gateway" \
            --tag-list="docker,ubuntu" \
            --run-untagged=true \
            --tls-ca-file=/etc/gitlab-runner/certs/gitlab.example.com.crt
        else
          echo "Runner config already exists, skipping registration"
        fi
    environment:
      - CI_SERVER_URL=https://gitlab.example.com
      - REGISTRATION_TOKEN=2Ej7yHbUSeYH6mivKVTE
      - DOCKER_TLS_VERIFY=1
      - DOCKER_CERT_PATH=/certs/client
    volumes:
      - ./.secrets/dind_SERVICE/certs:/certs
      - runner-config:/etc/gitlab-runner:z
      - ./.secrets/create-certificate_SERVICE/ssl:/etc/gitlab-runner/certs:ro,z
    profiles:
      - manual
    networks:
      gitlab-internal:
    extra_hosts:
      - "gitlab.example.com:host-gateway"

volumes:
  runner-config:
  dind-storage:

networks:
  gitlab-other:
  gitlab-internal:
